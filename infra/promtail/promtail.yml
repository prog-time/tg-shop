server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Логи всех контейнеров стека: Docker service discovery, а не чтение файлов
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # Только контейнеры этого compose-проекта
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        regex: tgshop
        action: keep
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
    pipeline_stages:
      # Go-сервисы и Traefik пишут JSON — разбираем уровень, чтобы фильтровать в Grafana
      - json:
          expressions:
            level: level
      - labels:
          level:
