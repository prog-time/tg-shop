global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api
    static_configs:
      - targets: ["api:8080"]

  - job_name: bot
    static_configs:
      - targets: ["bot:8081"]

  # Worker наружу HTTP не отдаёт, но метрики публикует на отдельном порту
  - job_name: worker
    static_configs:
      - targets: ["worker:8082"]

  - job_name: traefik
    static_configs:
      - targets: ["proxy:8082"]

  # Плагин rabbitmq_prometheus
  - job_name: rabbitmq
    static_configs:
      - targets: ["mq:15692"]
