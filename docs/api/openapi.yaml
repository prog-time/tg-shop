openapi: 3.1.0

info:
  title: Telegram Shop API
  version: 0.1.0
  description: |
    Pre-implementation REST contract for the tg-shop Go backend (`api` entrypoint).

    This specification is the **design artifact** produced by TASK-20260715-design-backend-rest-api,
    derived from `docs/architecture.md` (Level 3 — Components of Backend API) and `docs/adr/*.md`.
    No backend code exists yet; this document is the contract that later implementation must satisfy.

    ### Source of truth
    `docs/architecture.md` remains the single source of truth for the system architecture. If anything
    in this spec conflicts with it, `docs/architecture.md` wins and this file must be corrected.

    ### Two authentication mechanisms (by design, not an oversight)
    - **Storefront (витрина)** — Telegram Web App `initData`, verified server-side only. See the
      `initData` security scheme.
    - **Admin panel (админка)** — a JWT issued by `POST /admin/auth/login`. See the `adminJWT`
      security scheme. Storefront and admin intentionally use different mechanisms
      (see `docs/architecture.md`, Security rules).

    ### What is deliberately absent from this contract
    - Any endpoint that publishes to RabbitMQ or reads/writes the `outbox` table. The transactional
      outbox (ADR-004) is an internal implementation detail of the `orders`/`payment` domain
      operations; it is never part of the public REST surface.
    - Any client-side `initData` signature verification endpoint. Verification happens exclusively
      inside `api`.
    - Hard-delete endpoints for dictionary values and field definitions — per ADR-002 they are
      archived/deprecated, never deleted.

    ### Conventions
    - All paths are versioned under `/api/v1` (see `servers`).
    - All responses use the envelope pattern: `{ "data": ... }` for single resources,
      `{ "data": [...], "meta": {...} }` for lists. No endpoint returns a raw array.
    - All identifiers are 64-bit integers (`format: int64`), matching the indicative `bigint` primary
      keys in `docs/database.md`. This is a judgment call — the schema explicitly labels its key
      types as not yet frozen; if the team switches to UUIDs during implementation, only the `format`
      of the `id` fields changes, not their JSON position, so this is a low-risk choice to fix now.
    - Money is a decimal string with exactly two fraction digits (e.g. `"1999.00"`), matching the
      `numeric` column type used throughout `docs/database.md`. The shop is single-currency (no
      `currency` column exists on any monetary table), so `Money` does not carry a currency code;
      the operating currency is a shop-wide setting (`GET /admin/settings`). This is the pagination/
      money judgment call required by the task brief.
    - Pagination is offset-based: `page` (default 1) / `limit` (default 20, max 100), with a `meta`
      block carrying `page`, `limit`, `total`, `total_pages`.
    - Sorting: `sort` query parameter, comma-separated fields, `-` prefix for descending.
    - Filtering: plain query parameters named after the field; range filters use `_gte`/`_lte`;
      multi-value filters repeat the parameter. Facet filtering on `/products` uses a repeatable
      `facet` parameter (see its parameter description) because facet keys are dynamic
      (`field_definition_id:dictionary_value_id` pairs), not a fixed field name.
    - Errors use one shared envelope everywhere: `{ "error": { "code", "message", "details": [...] } }`.

servers:
  - url: /api/v1
    description: Reverse-proxied path on the shared storefront/API host (Traefik routes
      `$DOMAIN/api` to the `api` container; storefront and API share one origin by design).

tags:
  - name: auth
    description: >
      Admin (staff) authentication — email/password login, refresh, logout, current session — and
      the storefront's own identity check (`GET /me`), which relies on `initData` rather than a
      login flow. Maps to the Auth Module in `docs/architecture.md`.
  - name: catalog
    description: >
      Read-only storefront browsing of categories, products, and facet filters. Maps to the Catalog
      Module. `products.attributes` are always resolved from dictionary-value ids to display labels
      in responses — clients never see raw ids without a label.
  - name: content
    description: >
      Read-only storefront access to blog/news posts. Maps to the Content Module. Managing posts,
      dictionaries, dictionary values, and field definitions is an `admin`-tag concern — this tag is
      customer reads only.
  - name: cart
    description: >
      Customer's shopping cart, stored in Redis (never PostgreSQL). Maps to the Cart Module. Prices
      shown here are live catalog prices; they are only frozen into a snapshot at checkout
      (`POST /orders`).
  - name: delivery
    description: >
      Storefront listing of delivery methods and cost quoting. Maps to the Delivery Module.
  - name: orders
    description: >
      Customer checkout and order history. Checkout (`POST /orders`) is one atomic operation:
      the server assembles the order from the cart, decrements stock under a row lock, computes
      delivery cost, snapshots item/delivery/payment-method details, and persists the order —
      exactly as required by `docs/architecture.md` (Orders Module). Order responses never
      re-resolve snapshot fields against the live catalog.
  - name: payment
    description: >
      Payment initiation, status, and the public provider webhook. Maps to the Payment Module. The
      webhook is the only public (non-authenticated-by-user) endpoint in this contract; it is
      authenticated by provider signature and is idempotent on `provider_payment_id`.
  - name: media
    description: >
      Presigned-upload issuance and upload confirmation for the Media Module. File bytes are never
      proxied through `api` — clients upload directly to MinIO using the presigned URL. Upload is
      admin-only (product images and post covers are staff-managed content).
  - name: admin
    description: >
      Staff-only surface (Admin Module). Every admin operation calls the same domain services the
      storefront uses (no privileged direct-DB shortcuts), and documents the RBAC role(s) required
      (`admin`, `order_manager`, `content_manager`) in its description. Dictionary values and field
      definitions are archived/deprecated, never hard-deleted, per ADR-002.

security:
  - initData: []

paths:
  # ---------------------------------------------------------------- auth --
  /admin/auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Staff login
      description: |
        Exchanges staff email/password for an access/refresh JWT pair. No RBAC role required (this
        endpoint authenticates staff identity itself).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [tokens, admin_user]
                    properties:
                      tokens:
                        $ref: '#/components/schemas/TokenPair'
                      admin_user:
                        $ref: '#/components/schemas/AdminUser'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/auth/refresh:
    post:
      operationId: adminRefresh
      tags: [auth]
      summary: Refresh admin session
      description: Exchanges a valid refresh token for a new access/refresh token pair (rotation).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair issued.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/TokenPair'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Staff logout
      description: Revokes the presented refresh token (and, at implementation's discretion, the
        current access token) so the session can no longer be refreshed.
      security:
        - adminJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Logged out.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/auth/me:
    get:
      operationId: getAdminMe
      tags: [auth]
      summary: Current staff session
      description: Returns the authenticated staff account and role.
      security:
        - adminJWT: []
      responses:
        '200':
          description: Current admin user.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/AdminUser'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current storefront customer
      description: >
        Returns (creating on first sight, if necessary) the customer record derived from the
        verified Telegram `initData`. There is no separate storefront login — identity is entirely
        `initData`-driven.
      responses:
        '200':
          description: Current customer.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/Customer'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  # ------------------------------------------------------------- catalog --
  /categories:
    get:
      operationId: listCategories
      tags: [catalog]
      summary: List categories
      description: Flat list of active categories (use `parent_id` to walk the tree client-side).
      parameters:
        - name: parent_id
          in: query
          description: Filter to direct children of this category id. Use `null` (literal string)
            to list only root categories.
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: sort
          in: query
          description: 'Comma-separated fields, `-` prefix for descending. Allowed: `position`, `name`.'
          schema:
            type: string
            default: position
          example: position
      responses:
        '200':
          description: Category list.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /categories/{categoryId}:
    get:
      operationId: getCategory
      tags: [catalog]
      summary: Get a category
      parameters:
        - $ref: '#/components/parameters/CategoryIdOrSlug'
      responses:
        '200':
          description: Category.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Category' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /categories/{categoryId}/facets:
    get:
      operationId: getCategoryFacets
      tags: [catalog]
      summary: Available filters for a category
      description: >
        Aggregates `product_facets` for every active product in this category into the set of
        filterable dictionary fields and their values (with counts), plus the observed price range.
        The storefront uses this to render the filter sidebar before the customer picks any filter.
      parameters:
        - $ref: '#/components/parameters/CategoryIdOrSlug'
      responses:
        '200':
          description: Facets available for this category.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [facets, price_range]
                    properties:
                      facets:
                        type: array
                        items: { $ref: '#/components/schemas/Facet' }
                      price_range:
                        type: object
                        required: [min, max]
                        properties:
                          min: { $ref: '#/components/schemas/Money' }
                          max: { $ref: '#/components/schemas/Money' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /products:
    get:
      operationId: listProducts
      tags: [catalog]
      summary: List / filter products
      description: >
        Filtering and sorting run against `product_facets` and indexed columns — never a JSONB scan
        of `attributes` — per ADR-002.
      parameters:
        - name: category_id
          in: query
          schema: { type: integer, format: int64 }
        - name: q
          in: query
          description: Free-text search over product name.
          schema: { type: string }
        - name: price_gte
          in: query
          description: Minimum price (inclusive), same decimal-string format as `Money`.
          schema: { type: string, pattern: '^\d+(\.\d{1,2})?$' }
        - name: price_lte
          in: query
          description: Maximum price (inclusive), same decimal-string format as `Money`.
          schema: { type: string, pattern: '^\d+(\.\d{1,2})?$' }
        - name: in_stock
          in: query
          description: 'If `true`, only products with `stock > 0`.'
          schema: { type: boolean }
        - name: facet
          in: query
          description: >
            Repeatable. Each value is `"<field_definition_id>:<dictionary_value_id>"`. Multiple
            values for the *same* `field_definition_id` are OR'd (e.g. size=S or size=M); values for
            *different* `field_definition_id`s are AND'd. Example: `facet=12:101&facet=12:102&facet=15:220`
            means `(size=101 OR size=102) AND (color=220)`.
          style: form
          explode: true
          schema:
            type: array
            items: { type: string, pattern: '^\d+:\d+$' }
          example: ['12:101', '15:220']
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: sort
          in: query
          description: 'Comma-separated fields, `-` prefix for descending. Allowed: `price`, `name`, `created_at`.'
          schema:
            type: string
            default: '-created_at'
          example: price
        - $ref: '#/components/parameters/Fields'
      responses:
        '200':
          description: Product list.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ProductListItem' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /products/{productId}:
    get:
      operationId: getProduct
      tags: [catalog]
      summary: Get a product
      description: >
        `attributes` are resolved: every dictionary-backed field returns the current label text
        alongside the id, never a bare id. Archived dictionary values remain visible here if a
        product still references them (per ADR-002), the archived flag is set to `true`.
      parameters:
        - $ref: '#/components/parameters/ProductIdOrSlug'
      responses:
        '200':
          description: Product.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  # ------------------------------------------------------------- content --
  /posts:
    get:
      operationId: listPosts
      tags: [content]
      summary: List published posts
      description: Only posts with a non-null `published_at` in the past are returned (drafts are
        an `admin`-tag concern).
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: sort
          in: query
          description: 'Comma-separated fields, `-` prefix for descending. Allowed: `published_at`.'
          schema: { type: string, default: '-published_at' }
      responses:
        '200':
          description: Post list.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Post' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /posts/{postId}:
    get:
      operationId: getPost
      tags: [content]
      summary: Get a published post
      parameters:
        - $ref: '#/components/parameters/PostIdOrSlug'
      responses:
        '200':
          description: Post.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Post' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  # ---------------------------------------------------------------- cart --
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get the current customer's cart
      description: Reads directly from Redis, keyed by the authenticated customer. Prices are
        live catalog prices, refreshed on every read (not frozen — freezing happens at checkout).
      responses:
        '200':
          description: Cart (empty cart is a valid `200`, not a `404`).
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Cart' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear the cart
      responses:
        '204':
          description: Cart cleared.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Add an item to the cart
      description: If the product is already in the cart, `quantity` is added to the existing line
        (not replaced) — use `PATCH /cart/items/{productId}` to set an absolute quantity.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '200':
          description: Updated cart.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Cart' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Requested quantity exceeds available stock.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }

  /cart/items/{productId}:
    patch:
      operationId: updateCartItem
      tags: [cart]
      summary: Set an item's quantity
      description: >
        Sets the line to exactly `quantity` (not additive). A quantity of zero is rejected — use
        `DELETE` to remove the line.
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
      responses:
        '200':
          description: Updated cart.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Cart' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Requested quantity exceeds available stock.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Remove an item from the cart
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Updated cart.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Cart' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  # ------------------------------------------------------------ delivery --
  /delivery-methods:
    get:
      operationId: listDeliveryMethods
      tags: [delivery]
      summary: List active delivery methods
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Delivery method list.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/DeliveryMethod' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /delivery-quotes:
    post:
      operationId: createDeliveryQuote
      tags: [delivery]
      summary: Quote delivery cost for the current cart and an address
      description: >
        Computes cost for the authenticated customer's current cart contents (weight/total-driven
        rules live in `delivery_methods.config`) delivered to the given address. Does not persist
        anything — it is recomputed for real at checkout and frozen into the order snapshot then.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeliveryQuoteRequest'
      responses:
        '200':
          description: Delivery quote.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/DeliveryQuote' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Cart is empty — nothing to quote.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }

  # -------------------------------------------------------------- orders --
  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Checkout — create an order from the current cart
      description: >
        Single atomic operation (see Orders Module in `docs/architecture.md`): assembles line items
        from the customer's cart, locks and decrements product stock, computes the delivery quote,
        snapshots item/delivery/payment-method details onto the order, persists it, and clears the
        cart. The domain event that eventually triggers a customer notification is written to the
        `outbox` table in the same transaction — that write is an internal detail and is not part
        of this response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Cart is empty, or stock is insufficient for one or more lines.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }
    get:
      operationId: listMyOrders
      tags: [orders]
      summary: List my orders
      parameters:
        - name: status
          in: query
          description: Repeatable.
          style: form
          explode: true
          schema:
            type: array
            items: { $ref: '#/components/schemas/OrderStatus' }
        - name: created_at_gte
          in: query
          schema: { type: string, format: date-time }
        - name: created_at_lte
          in: query
          schema: { type: string, format: date-time }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: sort
          in: query
          description: 'Comma-separated fields, `-` prefix for descending. Allowed: `created_at`, `total`.'
          schema: { type: string, default: '-created_at' }
      responses:
        '200':
          description: Order list.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Order' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '500': { $ref: '#/components/responses/InternalError' }

  /orders/{orderId}:
    get:
      operationId: getMyOrder
      tags: [orders]
      summary: Get one of my orders
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Order.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  # ------------------------------------------------------------- payment --
  /orders/{orderId}/payments:
    post:
      operationId: initiatePayment
      tags: [payment]
      summary: Initiate (or re-initiate) payment for an order
      description: >
        Creates a `Payment` for the order and returns a provider `confirmation_url` for the
        customer to complete payment. Checkout (`POST /orders`) already initiates the first payment
        automatically using the order's `payment_method_id`; call this endpoint again only to retry
        after a failed/expired attempt (e.g. `confirmation_url` expired) or to switch
        `payment_method_id`. Requesting a new payment while a `pending` one exists for the same
        order returns the existing pending `Payment` rather than creating a duplicate.
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiatePaymentRequest'
      responses:
        '201':
          description: Payment created.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Payment' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Order is not in a payable state (e.g. already `paid` or `cancelled`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }

  /payments/{paymentId}:
    get:
      operationId: getPayment
      tags: [payment]
      summary: Get payment status
      description: Accessible to the owning customer (via `initData`) or any authenticated staff
        member (via `adminJWT`); the handler still scopes customer access to their own orders.
      security:
        - initData: []
        - adminJWT: []
      parameters:
        - name: paymentId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Payment.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Payment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /payments/webhook/{provider}:
    post:
      operationId: paymentWebhook
      tags: [payment]
      summary: Payment provider callback
      description: >
        The only public endpoint in this contract. Authenticated by the provider's signature
        (see the `providerSignature` security scheme), never by `initData`/`adminJWT`. Idempotent on
        `provider_payment_id`: replays of the same callback must not change state twice or notify
        the customer twice. Payload shape is provider-specific (Telegram Payments / YooKassa /
        Stripe per `docs/architecture.md`); `PaymentWebhookPayload` below is the normalized envelope
        this contract commits to — mapping each provider's native payload into it is an
        implementation detail behind this endpoint, not a v1 concern.
      security:
        - providerSignature: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
            enum: [telegram, yookassa, stripe]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookPayload'
      responses:
        '200':
          description: Callback accepted (including "already processed" replays — always ack with
            `200` so the provider does not retry a callback we've already handled).
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [received]
                    properties:
                      received: { type: boolean, const: true }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: Missing or invalid provider signature.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  # ---------------------------------------------------------------- media --
  /media/presigned-uploads:
    post:
      operationId: createPresignedUpload
      tags: [media]
      summary: Request a presigned upload URL
      description: >
        Issues a time-limited presigned PUT URL for direct browser-to-MinIO upload. File bytes never
        pass through `api`. The URL is signed against the public S3 endpoint
        (`S3_PUBLIC_URL`), not the internal one, per `docs/architecture.md`. Staff-only: product
        images and post covers are managed content.
      security:
        - adminJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignUploadRequest'
      responses:
        '201':
          description: Presigned upload issued.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/PresignedUpload' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422':
          description: Rejected `content_type` or `size_bytes` over the allowed limit for `purpose`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalError' }

  /media:
    post:
      operationId: confirmMedia
      tags: [media]
      summary: Confirm an uploaded object and register it
      description: Called after the client successfully PUTs the file to the presigned URL. Creates
        the `media` row; the object is not usable as a product image / post cover until this step
        completes.
      security:
        - adminJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmMediaRequest'
      responses:
        '201':
          description: Media registered.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Media' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404':
          description: '`object_key` was never issued by `POST /media/presigned-uploads`, or the
            object is not present in the bucket yet.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: '`object_key` already confirmed as a `Media` record.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }

  /media/{mediaId}:
    get:
      operationId: getMedia
      tags: [media]
      summary: Get media metadata
      security:
        - adminJWT: []
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Media.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Media' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: deleteMedia
      tags: [media]
      summary: Delete media
      description: Hard delete (media is not subject to the archive-don't-delete invariant, which
        applies specifically to dictionary values and field definitions). Blocked with `409` while
        the object is still referenced by a product image or post cover.
      security:
        - adminJWT: []
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204':
          description: Deleted.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Still referenced by a product image or post cover.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalError' }

  # ---------------------------------------------------------------- admin --
  /admin/products:
    get:
      operationId: adminListProducts
      tags: [admin]
      summary: List products (staff view)
      description: 'Required role: `content_manager` or `admin`. Unlike the storefront list, this
        includes inactive products and returns raw `stock`.'
      security: [{ adminJWT: [] }]
      parameters:
        - name: category_id
          in: query
          schema: { type: integer, format: int64 }
        - name: is_active
          in: query
          schema: { type: boolean }
        - name: q
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/Page'
