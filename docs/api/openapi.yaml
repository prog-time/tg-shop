                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: adminUpdateProduct
      tags: [admin]
      summary: Update a product
      description: 'Required role: `content_manager` or `admin`. Rebuilds `product_facets` when
        `category_id` or `attributes` change.'
      security: [{ adminJWT: [] }]
      parameters:
        - name: productId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Updated product.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: adminDeleteProduct
      tags: [admin]
      summary: Delete a product
      description: >
        Required role: `content_manager` or `admin`. Existing `order_items` are unaffected — they
        hold a frozen snapshot (`name_snapshot`, `price_snapshot`, `attributes_snapshot`) and a
