                    type: array
                    items: { $ref: '#/components/schemas/Product' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: adminCreateProduct
      tags: [admin]
      summary: Create a product
      description: >
        Required role: `content_manager` or `admin`. `attributes` are validated in Go against
        `field_definitions` for the given `category_id` — "anything goes in JSONB" is not allowed
        (ADR-002). `catalog` rebuilds `product_facets` for this product as part of the write.
      security: [{ adminJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product created.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422':
          description: '`attributes` failed validation against `field_definitions` for the category.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/products/{productId}:
    get:
      operationId: adminGetProduct
      tags: [admin]
