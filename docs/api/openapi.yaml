        the storefront checkout uses — invalid transitions (e.g. `delivered` → `pending_payment`)
        are rejected with `409`, not silently applied.
      security: [{ adminJWT: [] }]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Updated order.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Requested status is not a valid transition from the current status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/settings:
    get:
      operationId: adminGetSettings
      tags: [admin]
      summary: Get shop settings
      description: >
        Required role: `admin`. **Judgment call**: `docs/database.md` does not model a settings
        table explicitly; this contract assumes a simple single-row configuration resource. Confirm
        the storage mechanism during implementation and update `docs/database.md` if it introduces a
        new table.
      security: [{ adminJWT: [] }]
      responses:
        '200':
          description: Settings.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Settings' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: adminUpdateSettings
      tags: [admin]
      summary: Update shop settings
      description: 'Required role: `admin`.'
      security: [{ adminJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingsRequest'
      responses:
        '200':
          description: Updated settings.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Settings' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/roles:
    get:
      operationId: adminListRoles
      tags: [admin]
      summary: List RBAC roles
      description: >
        Required role: `admin`. The set of role **codes** (`admin`, `order_manager`,
        `content_manager`) is fixed by the architecture, not user-extensible — this endpoint exists
        for UI dropdowns and to expose each role's `permissions` document, not to create new roles
        (there is no `POST`).
      security: [{ adminJWT: [] }]
      responses:
        '200':
          description: Role list.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Role' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/roles/{roleId}:
    get:
      operationId: adminGetRole
      tags: [admin]
      summary: Get a role
      description: 'Required role: `admin`.'
      security: [{ adminJWT: [] }]
      parameters:
        - name: roleId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Role.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Role' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: adminUpdateRole
      tags: [admin]
      summary: Update a role's permissions
      description: 'Required role: `admin`. Only `permissions` is mutable — `code` and `name` are
        fixed by the architecture''s three-role model.'
      security: [{ adminJWT: [] }]
      parameters:
        - name: roleId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Updated role.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/Role' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/admin-users:
    get:
      operationId: adminListAdminUsers
      tags: [admin]
      summary: List staff accounts
      description: 'Required role: `admin`.'
      security: [{ adminJWT: [] }]
      parameters:
        - name: role
          in: query
          schema: { $ref: '#/components/schemas/RoleName' }
        - name: is_active
          in: query
          schema: { type: boolean }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Staff account list.
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AdminUser' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      operationId: adminCreateAdminUser
      tags: [admin]
      summary: Create a staff account
      description: 'Required role: `admin`.'
      security: [{ adminJWT: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdminUserRequest'
      responses:
        '201':
          description: Staff account created.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/AdminUser' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }

  /admin/admin-users/{adminUserId}:
    get:
      operationId: adminGetAdminUser
      tags: [admin]
      summary: Get a staff account
      description: 'Required role: `admin`.'
      security: [{ adminJWT: [] }]
      parameters:
        - name: adminUserId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Staff account.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/AdminUser' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    patch:
      operationId: adminUpdateAdminUser
      tags: [admin]
      summary: Update a staff account (role, active flag, password reset)
      description: 'Required role: `admin`.'
      security: [{ adminJWT: [] }]
      parameters:
        - name: adminUserId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdminUserRequest'
      responses:
        '200':
          description: Updated staff account.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/AdminUser' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/UnprocessableEntity' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      operationId: adminDeactivateAdminUser
      tags: [admin]
      summary: Deactivate a staff account
      description: >
        Required role: `admin`. Implemented as deactivation (`is_active: false`), not a hard delete
        — staff accounts are kept for audit trail (e.g. `admin_users` referenced from future audit
        logs of order status changes). A `204` is returned either way; deactivated accounts can no
        longer authenticate.
      security: [{ adminJWT: [] }]
      parameters:
        - name: adminUserId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204':
          description: Deactivated.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

components:
  securitySchemes:
    initData:
      type: apiKey
      in: header
      name: Authorization
      description: >
        Telegram Web App initData. Send as `Authorization: tma <initData>`, where `<initData>` is
        the raw, URL-encoded initData string handed to the storefront by the Telegram client SDK.
        Signature verification against the bot token happens exclusively inside `api` (Auth Module);
        there is no client-side verification endpoint and none should ever be added.
    adminJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Staff authentication. Obtain a token pair via `POST /admin/auth/login`, refresh via
        `POST /admin/auth/refresh`. Distinct from `initData` by design — storefront and admin never
        share an authentication mechanism.
    providerSignature:
      type: apiKey
      in: header
      name: X-Payment-Signature
      description: >
        Signature computed by the payment provider over the raw webhook request body (e.g. HMAC-SHA256
        with a provider-issued secret). The exact algorithm and native header name are
        provider-specific (Telegram Payments / YooKassa / Stripe each differ); `X-Payment-Signature`
        is this contract's normalized header name — mapping a provider's native signature header
        into it, if they differ, is an implementation detail of the webhook route, not a v1 concern.
        A request with a missing or invalid signature must be rejected with `401` before any
        business logic runs.

  parameters:
    Page:
      name: page
      in: query
      description: 1-indexed page number.
      schema: { type: integer, minimum: 1, default: 1 }
    Limit:
      name: limit
      in: query
      description: Items per page.
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    Fields:
      name: fields
      in: query
      description: Comma-separated sparse fieldset. Reduces payload size by returning only the
        named top-level fields of each item.
      schema: { type: string }
      example: id,name,price
    CategoryIdOrSlug:
      name: categoryId
      in: path
      required: true
      description: Category `id` (integer) or `slug` (string) — both are accepted by the same
        lookup.
      schema: { type: string }
    ProductIdOrSlug:
      name: productId
      in: path
      required: true
      description: Product `id` (integer) or `slug` (string) — both are accepted by the same
        lookup.
      schema: { type: string }
    PostIdOrSlug:
      name: postId
      in: path
      required: true
      description: Post `id` (integer) or `slug` (string) — both are accepted by the same lookup.
      schema: { type: string }

  responses:
    BadRequest:
      description: Malformed request (bad query parameter, invalid JSON, etc.).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing, invalid, or expired credentials.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated, but the role does not permit this operation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource does not exist.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: State conflict (duplicate unique key, invalid state transition, or a referenced
        resource still in use).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    UnprocessableEntity:
      description: Request is well-formed JSON but fails semantic/business validation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    TooManyRequests:
      description: Rate limit exceeded.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    # ------------------------------------------------------------- shared --
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Stable machine-readable error code.
              enum:
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - RATE_LIMITED
                - INTERNAL_ERROR
              example: VALIDATION_ERROR
            message:
              type: string
              description: Human-readable description, safe to display to staff (not necessarily to
                end customers).
              example: email must be a valid email address
            details:
              type: array
              items:
                type: object
                required: [field, issue]
                properties:
                  field: { type: string, example: email }
                  issue: { type: string, example: must be a valid email address }

    Money:
      type: string
      description: Decimal amount with exactly two fraction digits, in the shop's single operating
        currency (see `Settings.default_currency`). No embedded currency code — see the `info`
        block for why.
      pattern: '^\d+\.\d{2}$'
      example: '1999.00'

    PaginationMeta:
      type: object
      required: [page, limit, total, total_pages]
      properties:
        page: { type: integer, minimum: 1 }
        limit: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }
        total_pages: { type: integer, minimum: 0 }

    # --------------------------------------------------------------- auth --
    AdminLoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }

    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, const: Bearer }
        expires_in:
          type: integer
          description: Access token lifetime in seconds.
          example: 900

    RoleName:
      type: string
      enum: [admin, order_manager, content_manager]

    AdminUser:
      type: object
      required: [id, email, role, is_active, created_at]
      properties:
        id: { type: integer, format: int64 }
        email: { type: string, format: email }
        full_name:
          type: ["string", "null"]
          description: >
            Judgment call: `docs/database.md`'s `admin_users` table does not currently list a
            `full_name` column, only `email`/`password_hash`/`role_id`. Added here as an optional,
            additive display field for the admin UI (e.g. attributing order-status changes to a
            person); confirm and add the column during implementation, or drop this field if the
            team prefers email-only identification.
        role: { $ref: '#/components/schemas/RoleName' }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    CreateAdminUserRequest:
      type: object
      required: [email, password, role]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        role: { $ref: '#/components/schemas/RoleName' }
        full_name: { type: ["string", "null"] }

    UpdateAdminUserRequest:
      type: object
      properties:
        role: { $ref: '#/components/schemas/RoleName' }
        is_active: { type: boolean }
        full_name: { type: ["string", "null"] }
        password:
          type: string
          minLength: 8
          description: Set to reset the account's password.

    Role:
      type: object
      required: [id, code, name, permissions]
      properties:
        id: { type: integer, format: int64 }
        code: { $ref: '#/components/schemas/RoleName' }
        name: { type: string }
        permissions:
          type: object
          additionalProperties: true
          description: Free-form permission document (jsonb in storage); shape is an implementation
            detail beyond the fixed role codes.

    UpdateRoleRequest:
      type: object
      required: [permissions]
      properties:
        permissions:
          type: object
          additionalProperties: true

    Customer:
      type: object
      required: [id, telegram_id, created_at]
      properties:
        id: { type: integer, format: int64 }
        telegram_id: { type: integer, format: int64 }
        username: { type: ["string", "null"] }
        first_name: { type: ["string", "null"] }
        last_name: { type: ["string", "null"] }
        created_at: { type: string, format: date-time }

    # ------------------------------------------------------------ catalog --
    Category:
      type: object
      required: [id, name, slug, position, is_active, created_at, updated_at]
      properties:
        id: { type: integer, format: int64 }
        parent_id: { type: ["integer", "null"], format: int64 }
        name: { type: string }
        slug: { type: string }
        description:
          type: ["string", "null"]
          description: >
            Judgment call / additive field: not present in the current (indicative)
            `docs/database.md` ERD for `categories`, added here for storefront category-landing
            copy. Non-breaking to add later if omitted now, but flagged for confirmation.
        image:
          oneOf:
            - $ref: '#/components/schemas/Media'
            - type: 'null'
          description: Same judgment-call status as `description` above.
        position: { type: integer }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateCategoryRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        slug:
          type: string
          description: Auto-derived from `name` when omitted.
        parent_id: { type: ["integer", "null"], format: int64 }
        description: { type: ["string", "null"] }
        image_id: { type: ["integer", "null"], format: int64 }
        position: { type: integer, default: 0 }
        is_active: { type: boolean, default: true }

    UpdateCategoryRequest:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        parent_id: { type: ["integer", "null"], format: int64 }
        description: { type: ["string", "null"] }
        image_id: { type: ["integer", "null"], format: int64 }
        position: { type: integer }
        is_active: { type: boolean }

    Dictionary:
      type: object
      required: [id, code, name, created_at]
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        created_at: { type: string, format: date-time }

    CreateDictionaryRequest:
      type: object
      required: [code, name]
      properties:
        code: { type: string }
        name: { type: string }

    UpdateDictionaryRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }

    DictionaryValue:
      type: object
      required: [id, dictionary_id, value, position, is_archived, created_at]
      properties:
        id: { type: integer, format: int64 }
        dictionary_id: { type: integer, format: int64 }
        value: { type: string }
        position: { type: integer }
        is_archived:
          type: boolean
          description: 'True once `archived_at` is set. Archived values are excluded from
            new-product pickers but keep rendering correctly on products created before archiving.'
        created_at: { type: string, format: date-time }

    CreateDictionaryValueRequest:
      type: object
      required: [value]
      properties:
        value: { type: string }
        position: { type: integer, default: 0 }

    UpdateDictionaryValueRequest:
      type: object
      properties:
        value: { type: string }
        position: { type: integer }
        is_archived: { type: boolean }

    FieldDefinitionType:
      type: string
      enum: [string, number, bool, date, dictionary, dictionary_multi]
      description: >
        `dictionary`/`dictionary_multi` reference `DictionaryValue` rows by id (never free text, per
        ADR-002). `date` is a judgment-call addition beyond `docs/database.md`'s indicative
        `"string, number, bool, dictionary, dictionary_multi, ..."` comment — the ERD's trailing
        `...` signals the type list is not closed.

    FieldDefinition:
      type: object
      required: [id, category_id, code, label, type, required, position, show_in_list, is_deprecated, created_at]
      properties:
        id: { type: integer, format: int64 }
        category_id: { type: integer, format: int64 }
        dictionary_id:
          type: ["integer", "null"]
          format: int64
          description: Required (non-null) when `type` is `dictionary` or `dictionary_multi`; must
            be null otherwise.
        code: { type: string, description: Stable machine key used as the property name inside
          `products.attributes`. }
        label: { type: string, description: Human-readable label shown in forms and filters. }
        type: { $ref: '#/components/schemas/FieldDefinitionType' }
        required: { type: boolean }
        validation:
          type: ["object", "null"]
          additionalProperties: true
          description: Free-form validation rules (jsonb), e.g. `min`/`max`/`min_length`/
            `max_length`/`pattern`, interpreted per `type`.
        position: { type: integer }
        show_in_list:
          type: boolean
          description: Whether this field renders as a column in the admin product list.
        is_deprecated: { type: boolean }
        created_at: { type: string, format: date-time }

    CreateFieldDefinitionRequest:
      type: object
      required: [category_id, code, label, type, required]
      properties:
        category_id: { type: integer, format: int64 }
        dictionary_id: { type: ["integer", "null"], format: int64 }
        code: { type: string }
        label: { type: string }
        type: { $ref: '#/components/schemas/FieldDefinitionType' }
        required: { type: boolean, default: false }
        validation: { type: ["object", "null"], additionalProperties: true }
        position: { type: integer, default: 0 }
        show_in_list: { type: boolean, default: false }

    UpdateFieldDefinitionRequest:
      type: object
      description: '`category_id`, `code`, `type`, and `dictionary_id` are intentionally absent —
        they are immutable after creation.'
      properties:
        label: { type: string }
        required: { type: boolean }
        validation: { type: ["object", "null"], additionalProperties: true }
        position: { type: integer }
        show_in_list: { type: boolean }
        is_deprecated: { type: boolean }

    DictionaryValueRef:
      type: object
      required: [id, value, is_archived]
      properties:
        id: { type: integer, format: int64 }
        value: { type: string }
        is_archived: { type: boolean }

    AttributeValue:
      type: object
      description: >
        A single resolved product characteristic. For `dictionary`/`dictionary_multi` fields,
        `dictionary_values` carries the resolved label(s) — the raw id in storage is never returned
        without its current label attached, per ADR-002.
      required: [field_definition_id, code, label, type]
      properties:
        field_definition_id: { type: integer, format: int64 }
        code: { type: string }
        label: { type: string }
        type: { $ref: '#/components/schemas/FieldDefinitionType' }
        value:
          description: Present for `string`/`number`/`bool`/`date` types.
          oneOf:
            - type: string
            - type: number
            - type: boolean
        dictionary_values:
          description: Present for `dictionary` (one item) and `dictionary_multi` (0..n items) types.
          type: array
          items: { $ref: '#/components/schemas/DictionaryValueRef' }

    AttributeValueInput:
      type: object
      description: Write-side counterpart of `AttributeValue`. Provide `value` for scalar field
        types, or `dictionary_value_ids` for `dictionary`/`dictionary_multi` field types — never
        both. Validated server-side against the field's `field_definitions.type`.
      required: [field_definition_id]
      properties:
        field_definition_id: { type: integer, format: int64 }
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
        dictionary_value_ids:
          type: array
          items: { type: integer, format: int64 }

    Media:
      type: object
      required: [id, bucket, object_key, url, content_type, size_bytes, created_at]
      properties:
        id: { type: integer, format: int64 }
        bucket: { type: string }
        object_key: { type: string }
        url:
          type: string
          format: uri
          description: Public read URL, built from `S3_PUBLIC_URL` per `docs/architecture.md`.
        content_type: { type: string, example: image/webp }
        size_bytes: { type: integer, format: int64 }
        width: { type: ["integer", "null"] }
        height: { type: ["integer", "null"] }
        created_at: { type: string, format: date-time }

    ProductImage:
      type: object
      required: [media, position]
      properties:
        media: { $ref: '#/components/schemas/Media' }
        position: { type: integer }
        alt:
          type: ["string", "null"]
          description: Alt text is per-usage (`product_images.alt`), not on the `Media` record
            itself, since the same file could in principle be reused with different alt text.

    ProductImageInput:
      type: object
      required: [media_id]
      properties:
        media_id: { type: integer, format: int64 }
        position: { type: integer, default: 0 }
        alt: { type: ["string", "null"] }

    Product:
      type: object
      required: [id, category_id, name, slug, price, stock, is_active, images, attributes, created_at, updated_at]
      properties:
        id: { type: integer, format: int64 }
        category_id: { type: integer, format: int64 }
        name: { type: string }
        slug: { type: string }
        description:
          type: ["string", "null"]
          description: 'Judgment-call addition: not in the current `docs/database.md` ERD for
            `products` (which lists `name`/`slug`/`price`/`stock`/`attributes`/`is_active` only);
            flagged for confirmation, same rationale as `Category.description`.'
        price: { $ref: '#/components/schemas/Money' }
        stock: { type: integer, minimum: 0 }
        is_active: { type: boolean }
        images:
          type: array
          items: { $ref: '#/components/schemas/ProductImage' }
        attributes:
          type: array
          items: { $ref: '#/components/schemas/AttributeValue' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProductListItem:
      type: object
      description: Reduced projection for list views (extensibility/perf) — full `attributes` are
        only returned by `GET /products/{productId}`.
      required: [id, category_id, name, slug, price, in_stock]
      properties:
        id: { type: integer, format: int64 }
        category_id: { type: integer, format: int64 }
        name: { type: string }
        slug: { type: string }
        price: { $ref: '#/components/schemas/Money' }
        primary_image:
          oneOf:
            - $ref: '#/components/schemas/Media'
            - type: 'null'
        in_stock: { type: boolean, description: 'Derived: `stock > 0`.' }

    CreateProductRequest:
      type: object
      required: [category_id, name, price, stock]
      properties:
        category_id: { type: integer, format: int64 }
        name: { type: string }
        slug: { type: string, description: Auto-derived from `name` when omitted. }
        description: { type: ["string", "null"] }
        price: { $ref: '#/components/schemas/Money' }
        stock: { type: integer, minimum: 0 }
        is_active: { type: boolean, default: true }
        images:
          type: array
          items: { $ref: '#/components/schemas/ProductImageInput' }
        attributes:
          type: array
          items: { $ref: '#/components/schemas/AttributeValueInput' }

    UpdateProductRequest:
      type: object
      properties:
        category_id: { type: integer, format: int64 }
        name: { type: string }
        slug: { type: string }
        description: { type: ["string", "null"] }
        price: { $ref: '#/components/schemas/Money' }
        stock: { type: integer, minimum: 0 }
        is_active: { type: boolean }
        images:
          type: array
          items: { $ref: '#/components/schemas/ProductImageInput' }
        attributes:
          type: array
          items: { $ref: '#/components/schemas/AttributeValueInput' }

    FacetValue:
      type: object
      required: [dictionary_value_id, value, count]
      properties:
        dictionary_value_id: { type: integer, format: int64 }
        value: { type: string }
        count:
          type: integer
          minimum: 0
          description: Number of active products in this category carrying this value.

    Facet:
      type: object
      required: [field_definition_id, code, label, type, values]
      properties:
        field_definition_id: { type: integer, format: int64 }
        code: { type: string }
        label: { type: string }
        type: { $ref: '#/components/schemas/FieldDefinitionType' }
        values:
          type: array
          items: { $ref: '#/components/schemas/FacetValue' }

    # ------------------------------------------------------------ content --
    Post:
      type: object
      required: [id, title, slug, body_html, created_at, updated_at]
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        slug: { type: string }
        body_html:
          type: string
          description: >
            Sanitized HTML produced by the admin's TipTap rich-text editor (ADR-001). Naming
            judgment call: `docs/database.md` names the column simply `body`; `body_html` here
            documents its actual content shape for API consumers.
        cover_image:
          oneOf:
            - $ref: '#/components/schemas/Media'
            - type: 'null'
        published_at:
          type: ["string", "null"]
          format: date-time
          description: Null means draft. The storefront (`GET /posts`) never returns drafts.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreatePostRequest:
      type: object
      required: [title, body_html]
      properties:
        title: { type: string }
        slug: { type: string, description: Auto-derived from `title` when omitted. }
        body_html: { type: string }
        cover_media_id: { type: ["integer", "null"], format: int64 }
        published_at:
          type: ["string", "null"]
          format: date-time
          description: Omit or set null to save as a draft.

    UpdatePostRequest:
      type: object
      properties:
        title: { type: string }
        slug: { type: string }
        body_html: { type: string }
        cover_media_id: { type: ["integer", "null"], format: int64 }
        published_at: { type: ["string", "null"], format: date-time }

    # ---------------------------------------------------------------- cart --
    CartItem:
      type: object
      required: [product_id, name, price, quantity, line_total]
      properties:
        product_id: { type: integer, format: int64 }
        name:
          type: string
          description: Live product name at read time (the cart is not a snapshot; snapshotting
            happens only at checkout).
        price: { $ref: '#/components/schemas/Money' }
        quantity: { type: integer, minimum: 1 }
        image:
          oneOf:
            - $ref: '#/components/schemas/Media'
            - type: 'null'
        line_total: { $ref: '#/components/schemas/Money' }

    Cart:
      type: object
      required: [items, subtotal, item_count, updated_at]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CartItem' }
        subtotal: { $ref: '#/components/schemas/Money' }
        item_count: { type: integer, minimum: 0 }
        updated_at: { type: string, format: date-time }

    AddCartItemRequest:
      type: object
      required: [product_id, quantity]
      properties:
        product_id: { type: integer, format: int64 }
        quantity: { type: integer, minimum: 1, default: 1 }

    UpdateCartItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity: { type: integer, minimum: 1 }

    # ------------------------------------------------------------ delivery --
    Address:
      type: object
      required: [country, city, street, building]
      properties:
        country: { type: string }
        city: { type: string }
        street: { type: string }
        building: { type: string }
        apartment: { type: ["string", "null"] }
        postal_code: { type: ["string", "null"] }
        comment: { type: ["string", "null"] }

    DeliveryMethod:
      type: object
      required: [id, code, name, price, is_active]
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        price:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Base price before any `config`-driven adjustments (e.g. free-over-threshold)
            are applied by `POST /delivery-quotes`.
        config:
          type: object
          additionalProperties: true
          description: Free-form pricing/eligibility config (jsonb), e.g. `free_from`, weight
            brackets, region restrictions.
        is_active: { type: boolean }

    CreateDeliveryMethodRequest:
      type: object
      required: [code, name, price]
      properties:
        code: { type: string }
        name: { type: string }
        price: { $ref: '#/components/schemas/Money' }
        config: { type: object, additionalProperties: true }
        is_active: { type: boolean, default: true }

    UpdateDeliveryMethodRequest:
      type: object
      properties:
        name: { type: string }
        price: { $ref: '#/components/schemas/Money' }
        config: { type: object, additionalProperties: true }
        is_active: { type: boolean }

    DeliveryQuoteRequest:
      type: object
      required: [delivery_method_id, address]
      properties:
        delivery_method_id: { type: integer, format: int64 }
        address: { $ref: '#/components/schemas/Address' }

    DeliveryQuote:
      type: object
      required: [delivery_method_id, cost]
      properties:
        delivery_method_id: { type: integer, format: int64 }
        cost:
          allOf:
            - $ref: '#/components/schemas/Money'
          description: Final computed cost for the current cart + address (may be `0.00` if the
            cart qualifies for free delivery under `config`).

    # -------------------------------------------------------------- orders --
    OrderStatus:
      type: string
      enum: [pending_payment, paid, processing, shipped, delivered, cancelled, refunded]

    AttributeSnapshot:
      type: object
      description: >
        Frozen product characteristic captured at purchase time. Unlike the live `AttributeValue`,
        this stores plain display text, not dictionary-value ids — so a later rename or archival of
        the dictionary value can never alter what a past order shows (per the `order_items`
        invariant in `docs/architecture.md`).
      required: [code, label, value]
      properties:
        code: { type: string }
        label: { type: string }
        value:
          description: Frozen display text; an array for what was a `dictionary_multi` field at
            purchase time.
          oneOf:
            - type: string
            - type: array
              items: { type: string }

    OrderItem:
      type: object
      required: [id, name, price, quantity, attributes, line_total]
      properties:
        id: { type: integer, format: int64 }
        product_id:
          type: ["integer", "null"]
          format: int64
          description: Snapshot-reference only; nullable because deleting the live product must
            never remove or reinterpret this line (`docs/architecture.md` — `order_items` stores a
            snapshot).
        name: { type: string, description: '`name_snapshot` at purchase time.' }
        price: { allOf: [{ $ref: '#/components/schemas/Money' }], description: '`price_snapshot` at
          purchase time.' }
        quantity: { type: integer, minimum: 1 }
        attributes:
          type: array
          items: { $ref: '#/components/schemas/AttributeSnapshot' }
        line_total:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          description: 'Derived: `price * quantity`. Not a separate stored column.'

    OrderPaymentSummary:
      type: object
      description: The order's most recent `Payment`, if one has been initiated.
      required: [payment_id, status, amount]
      properties:
        payment_id: { type: integer, format: int64 }
        status: { $ref: '#/components/schemas/PaymentStatus' }
        amount: { $ref: '#/components/schemas/Money' }
        confirmation_url: { type: ["string", "null"], format: uri }

    Order:
      type: object
      required:
        - id
        - number
        - customer_id
        - status
        - items
        - delivery_name
        - delivery_price
        - address
        - payment_method_name
        - subtotal
        - total
        - created_at
        - updated_at
      properties:
        id: { type: integer, format: int64 }
        number:
          type: string
          description: 'Judgment call: derived, human-friendly display string (e.g. `"ORD-000123"`
            formatted from `id`), not a separate stored column in `docs/database.md`.'
        customer_id:
          type: integer
          format: int64
          description: 'Naming judgment call: maps to the `orders.user_id` column; renamed here for
            API clarity (a "user" of the storefront is always a "customer" in this contract).'
        status: { $ref: '#/components/schemas/OrderStatus' }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        delivery_method_id:
          type: ["integer", "null"]
          format: int64
          description: Reference to the *current* `DeliveryMethod` row; nullable because that method
            may later be deleted without touching this order (see `delivery_name`/`delivery_price`).
        delivery_name: { type: string, description: '`delivery_name_snapshot` at checkout time.' }
        delivery_price: { allOf: [{ $ref: '#/components/schemas/Money' }], description:
          '`delivery_price_snapshot` at checkout time.' }
        address: { $ref: '#/components/schemas/Address' }
        payment_method_id:
          type: ["integer", "null"]
          format: int64
          description: Reference to the *current* `PaymentMethod` row; nullable, same rationale as
            `delivery_method_id`.
        payment_method_name: { type: string, description: '`payment_name_snapshot` at checkout
          time.' }
        payment:
          oneOf:
            - $ref: '#/components/schemas/OrderPaymentSummary'
            - type: 'null'
        subtotal:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          description: 'Derived: sum of `items[].line_total`. Not a separate stored column
            (`docs/database.md` stores only the final `total`).'
        total: { $ref: '#/components/schemas/Money' }
        comment:
          type: ["string", "null"]
          description: >
            Judgment-call addition: a free-text delivery note from the customer (e.g. "leave at the
            door"). Not present in the current `docs/database.md` `orders` table; flagged for
            confirmation — if adopted, it likely belongs inside `delivery_address` jsonb rather than
            a new column, to avoid a migration.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateOrderRequest:
      type: object
      required: [delivery_method_id, address, payment_method_id]
      properties:
        delivery_method_id: { type: integer, format: int64 }
        address: { $ref: '#/components/schemas/Address' }
        payment_method_id: { type: integer, format: int64 }
        comment: { type: ["string", "null"] }

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: '#/components/schemas/OrderStatus' }
        comment:
          type: ["string", "null"]
          description: Optional internal note explaining the transition (e.g. a refund reason).

    # ------------------------------------------------------------- payment --
    PaymentStatus:
      type: string
      enum: [pending, succeeded, failed, refunded, cancelled]

    PaymentMethod:
      type: object
      required: [id, code, name, provider, is_active]
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        provider:
          type: string
          enum: [telegram, yookassa, stripe]
          description: External payment provider this method routes to (all optional per
            `docs/architecture.md` System Context — the payment provider is an external, optional
            system).
        is_active: { type: boolean }

    CreatePaymentMethodRequest:
      type: object
      required: [code, name, provider]
      properties:
        code: { type: string }
        name: { type: string }
        provider: { type: string, enum: [telegram, yookassa, stripe] }
        is_active: { type: boolean, default: true }

    UpdatePaymentMethodRequest:
      type: object
      properties:
        name: { type: string }
        is_active: { type: boolean }

    Payment:
      type: object
      required: [id, order_id, provider, status, amount, created_at, updated_at]
      properties:
        id: { type: integer, format: int64 }
        order_id: { type: integer, format: int64 }
        provider: { type: string, enum: [telegram, yookassa, stripe] }
        provider_payment_id:
          type: ["string", "null"]
          description: Provider-side payment id. Null until the provider assigns one at initiation;
            unique once set — the webhook uses it as the idempotency key.
        status: { $ref: '#/components/schemas/PaymentStatus' }
        amount: { $ref: '#/components/schemas/Money' }
        confirmation_url:
          type: ["string", "null"]
          format: uri
          description: Provider-hosted checkout URL. Not guaranteed persisted verbatim long-term
            (provider sessions expire) — re-initiate (`POST /orders/{orderId}/payments`) to get a
            fresh one.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    InitiatePaymentRequest:
      type: object
      properties:
        payment_method_id:
          type: integer
          format: int64
          description: Defaults to the order's existing `payment_method_id` if omitted.

    PaymentWebhookPayload:
      type: object
      description: >
        Normalized webhook envelope this contract commits to. Real providers (Telegram Payments /
        YooKassa / Stripe) each send a differently-shaped payload; translating a provider's native
        body into this shape is an implementation detail of the route handler for that `{provider}`,
        not a v1 contract concern.
      required: [provider_payment_id, status, raw]
      properties:
        provider_payment_id: { type: string }
        order_id:
          type: ["integer", "null"]
          format: int64
          description: Included when the provider echoes back the merchant order reference; if
            absent, the handler resolves the order via a prior `Payment.provider_payment_id`
            mapping recorded at initiation.
        status:
          type: string
          enum: [succeeded, failed, refunded]
        raw:
          type: object
          additionalProperties: true
          description: Provider's original payload, passed through verbatim for auditing/debugging.

    # --------------------------------------------------------------- media --
    MediaPurpose:
      type: string
      enum: [product_image, post_cover]

    PresignUploadRequest:
      type: object
      required: [filename, content_type, size_bytes, purpose]
      properties:
        filename: { type: string }
        content_type:
          type: string
          description: Must be one of the allowlisted image types for the given `purpose`
            (implementation-defined, e.g. `image/jpeg`, `image/png`, `image/webp`).
        size_bytes:
          type: integer
          format: int64
          description: Must not exceed the per-`purpose` limit returned in `PresignedUpload.max_size_bytes`.
        purpose: { $ref: '#/components/schemas/MediaPurpose' }

    PresignedUpload:
      type: object
      required: [upload_url, upload_method, object_key, expires_at, max_size_bytes, allowed_content_types]
      properties:
        upload_url:
          type: string
          format: uri
          description: Presigned URL, signed against `S3_PUBLIC_URL` (never the internal MinIO
            address) so browser uploads validate correctly.
        upload_method: { type: string, const: PUT }
        object_key: { type: string }
        required_headers:
          type: object
          additionalProperties: { type: string }
          description: Headers the client must send verbatim with the PUT (e.g. `Content-Type`).
        expires_at: { type: string, format: date-time }
        max_size_bytes: { type: integer, format: int64 }
        allowed_content_types:
          type: array
          items: { type: string }

    ConfirmMediaRequest:
      type: object
      required: [object_key]
      properties:
        object_key: { type: string }
        width: { type: ["integer", "null"] }
        height: { type: ["integer", "null"] }

    # --------------------------------------------------------------- admin --
    Settings:
      type: object
      description: >
        Judgment call: not modeled as a table in `docs/database.md`; assumed to be a single-row
        configuration resource. Confirm the persistence mechanism during implementation.
      required: [shop_name, default_currency, updated_at]
      properties:
        shop_name: { type: string }
        default_currency:
          type: string
          description: ISO 4217 code, informational only (see `Money` — amounts themselves carry no
            currency field since the shop is single-currency).
          pattern: '^[A-Z]{3}$'
          example: RUB
        contact_email: { type: ["string", "null"], format: email }
        contact_phone: { type: ["string", "null"] }
        updated_at: { type: string, format: date-time }

    UpdateSettingsRequest:
      type: object
      properties:
        shop_name: { type: string }
        default_currency: { type: string, pattern: '^[A-Z]{3}$' }
        contact_email: { type: ["string", "null"], format: email }
        contact_phone: { type: ["string", "null"] }
